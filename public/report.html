<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fit Map — 진단 리포트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:#f5f3ee;color:#1a1814;min-height:100vh}
header{position:sticky;top:0;z-index:100;background:#f5f3ee;border-bottom:1px solid rgba(26,24,20,.1);padding:0 2rem;height:58px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700}
.back{font-size:13px;color:#9a9188;background:none;border:none;cursor:pointer;font-family:'Pretendard',sans-serif;display:flex;align-items:center;gap:4px}
.back:hover{color:#1a1814}
.wrap{max-width:960px;margin:0 auto;padding:2rem 1.5rem 5rem}
.co-hdr{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-bottom:1.75rem;padding-bottom:1.25rem;border-bottom:1px solid rgba(26,24,20,.1)}
.co-nm{font-family:'Noto Serif KR',serif;font-size:26px;font-weight:700}
.co-sub{font-size:13px;color:#9a9188;margin-top:3px}
.co-dt{font-size:12px;color:#9a9188}
.tab-row{display:flex;border-bottom:1px solid rgba(26,24,20,.1);margin-bottom:1.5rem;gap:0;overflow-x:auto}
.tab{font-size:13px;font-weight:500;padding:9px 16px;cursor:pointer;color:#9a9188;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:'Pretendard',sans-serif;white-space:nowrap}
.tab.active{color:#1a1814;border-bottom-color:#1a1814}
.tp{display:none}.tp.active{display:block}
.sl{font-size:11px;font-weight:600;letter-spacing:1.2px;color:#9a9188;text-transform:uppercase;margin-bottom:10px}
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.mc{background:#fff;border:1px solid rgba(26,24,20,.08);border-radius:10px;padding:14px 16px}
.ml{font-size:11px;color:#9a9188;margin-bottom:5px}
.mv{font-size:21px;font-weight:600}
.ms{font-size:11px;color:#9a9188;margin-top:2px}
.mch{font-size:12px;margin-top:4px;font-weight:500}
.up{color:#3B6D11}.dn{color:#A32D2D}
.cw{background:#fff;border:1px solid rgba(26,24,20,.08);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.ct{font-size:14px;font-weight:600;margin-bottom:3px}
.cs{font-size:12px;color:#9a9188;margin-bottom:12px}
.leg{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:#9a9188}
.ld{width:10px;height:10px;border-radius:2px}
.note{background:#f5f3ee;border-radius:8px;padding:10px 14px;font-size:12px;color:#4a4540;line-height:1.7;margin:.75rem 0;border-left:2px solid rgba(26,24,20,.15)}
.note strong{color:#1a1814;font-weight:600}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem}
.tc{border-radius:12px;padding:13px 15px;border:1px solid}
.tw{background:#FCEBEB;border-color:#F09595}
.tok{background:#EAF3DE;border-color:#97C459}
.ti{background:#FAEEDA;border-color:#FAC775}
.tt{font-size:13px;font-weight:600;margin-bottom:3px}
.tw .tt{color:#A32D2D}.tok .tt{color:#3B6D11}.ti .tt{color:#854F0B}
.td2{font-size:12px;line-height:1.6}
.tw .td2{color:#A32D2D}.tok .td2{color:#3B6D11}.ti .td2{color:#854F0B}
.mt{width:100%;border-collapse:collapse;margin-bottom:1.5rem}
.mt th{font-size:12px;font-weight:600;color:#9a9188;padding:8px 12px;border-bottom:1px solid rgba(26,24,20,.1);text-align:left;background:#f5f3ee}
.mt td{font-size:13px;padding:9px 12px;border-bottom:1px solid rgba(26,24,20,.06);color:#1a1814;vertical-align:top}
.gr{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-size:13px;font-weight:700}
.gA{background:#EAF3DE;color:#3B6D11}.gB{background:#FAEEDA;color:#854F0B}.gC{background:#FCEBEB;color:#A32D2D}
.ob{display:inline-flex;gap:2px;font-size:17px;font-weight:700;letter-spacing:2px}
.dv{height:1px;background:rgba(26,24,20,.08);margin:1.25rem 0}
.summ{background:#fff;border:1px solid rgba(26,24,20,.08);border-radius:12px;padding:1rem 1.25rem;font-size:13px;line-height:1.8;margin-bottom:1.5rem}
/* 밸류업 */
.gp-hdr{background:#fff;border:1px solid rgba(26,24,20,.08);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.gp-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:#1a1814;color:#fff}
.gp-ttl{font-size:15px;font-weight:600;margin-left:6px}
.gp-sub{font-size:12px;color:#9a9188;margin-top:3px}
.gp-tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.gpt{font-size:12px;font-weight:500;padding:6px 14px;border-radius:999px;border:1px solid rgba(26,24,20,.15);background:#fff;cursor:pointer;color:#9a9188;font-family:'Pretendard',sans-serif;transition:all .15s}
.gpt.active{background:#1a1814;color:#fff;border-color:#1a1814}
.gpp{display:none}.gpp.active{display:block}
.gp-reason{font-size:12px;color:#4a4540;background:#f5f3ee;border-radius:8px;padding:9px 12px;margin-bottom:10px;line-height:1.65}
.mlist{display:flex;flex-direction:column;gap:8px}
.mcard{display:flex;align-items:flex-start;gap:12px;padding:10px 14px;background:#fff;border:1px solid rgba(26,24,20,.08);border-radius:10px}
.mrk{width:22px;height:22px;border-radius:50%;background:#f5f3ee;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#9a9188;flex-shrink:0;margin-top:1px}
.mbody{flex:1}
.mnm{font-size:13px;font-weight:600;margin-bottom:2px}
.mttl{font-size:11px;font-weight:400;color:#9a9188}
.morg{font-size:11px;color:#9a9188;margin-bottom:4px}
.mtags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:3px}
.mtag{font-size:10px;padding:2px 7px;border-radius:5px;background:#f5f3ee;color:#4a4540}
.ctag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;background:#E6F1FB;color:#185FA5;border:1px solid #85B7EB}
.mexp{font-size:11px;color:#4a4540;background:#f5f3ee;border-radius:5px;padding:4px 8px;margin-top:3px;line-height:1.5}
.mmatch{font-size:11px;color:#2d5a3d;background:#EAF3DE;border-radius:5px;padding:4px 8px;margin-top:2px;line-height:1.5}
.myrs{font-size:11px;color:#9a9188;white-space:nowrap;flex-shrink:0}
.pl{display:flex;flex-direction:column;gap:8px}
.pi{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:#fff;border:1px solid rgba(26,24,20,.08);border-radius:10px}
.prank{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.P1{background:#1a1814;color:#fff}.P2{background:#4a4540;color:#fff}.P3{background:#d0ccc4;color:#4a4540}
.pb{flex:1}.pnm{font-size:13px;font-weight:600}.prs{font-size:12px;color:#9a9188;margin-top:2px;line-height:1.5}
.ac-box{background:#f5f3ee;border-radius:12px;padding:1.25rem}
.ac-item{display:flex;gap:.75rem;font-size:13px;color:#4a4540;line-height:1.6;margin-bottom:.6rem}
.ac-num{width:20px;height:20px;border-radius:50%;background:#1a1814;color:#fff;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
/* 사업개발 */
.sc{background:#fff;border:1px solid rgba(26,24,20,.08);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1.5rem}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:.75rem}
.si{background:#f5f3ee;border-radius:8px;padding:10px 14px}
.sil{font-size:11px;color:#9a9188;font-weight:600;margin-bottom:5px}
.sic{font-size:12px;color:#1a1814;line-height:1.7}
.sic li{list-style:none;margin-bottom:2px}
.sic li::before{content:"· ";color:#9a9188}
.sr2{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.sp{font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;border:1px solid}
.sp-g{background:#EAF3DE;color:#3B6D11;border-color:#97C459}
.sp-b{background:#E6F1FB;color:#185FA5;border-color:#85B7EB}
.sp-a{background:#FAEEDA;color:#854F0B;border-color:#FAC775}
.sp-r{background:#FCEBEB;color:#A32D2D;border-color:#F09595}
.pst{font-size:13px;font-weight:600;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(26,24,20,.08);display:flex;align-items:center;gap:8px}
.ptb{font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px}
.tgb{background:#EEEDFE;color:#534AB7}
.tgg{background:#EAF3DE;color:#3B6D11}
.pc{background:#fff;border:1px solid rgba(26,24,20,.08);border-radius:12px;padding:1rem 1.25rem;margin-bottom:10px}
.pct{display:flex;align-items:flex-start;gap:10px}
.ppri{width:22px;height:22px;border-radius:50%;background:#f5f3ee;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#9a9188;flex-shrink:0;margin-top:2px}
.pcb{flex:1}
.pcn{font-size:13px;font-weight:600;margin-bottom:2px}
.pco{font-size:11px;color:#9a9188;margin-bottom:6px}
.prb{background:#f5f3ee;border-radius:8px;padding:8px 12px;font-size:12px;line-height:1.65;margin-bottom:6px}
.prb .wl{font-size:10px;font-weight:600;color:#9a9188;margin-bottom:3px}
.ptags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px}
.ptag{font-size:10px;padding:2px 7px;border-radius:5px;background:#f5f3ee;color:#4a4540}
.plink{font-size:11px;color:#185FA5;text-decoration:none}
.plink:hover{text-decoration:underline}
.pbg{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;flex-shrink:0}
.P1b{background:#FCEBEB;color:#A32D2D}.P2b{background:#FAEEDA;color:#854F0B}.P3b{background:#EAF3DE;color:#3B6D11}
.govst-open{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:#EAF3DE;color:#3B6D11}
.govst-closed{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;background:#f5f3ee;color:#9a9188}
.gov-prep{font-size:11px;color:#854F0B;background:#FAEEDA;border-radius:6px;padding:5px 10px;line-height:1.5;margin-top:5px}
.supp-box{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:8px 0}
.supp-item{background:#f5f3ee;border-radius:8px;padding:8px 10px}
.supp-label{font-size:10px;font-weight:600;color:#9a9188;margin-bottom:3px}
.supp-val{font-size:12px;font-weight:600}
.supp-val.money{color:#3B6D11}
.supp-detail{font-size:11px;color:#4a4540;line-height:1.6;margin:4px 0}
.supp-detail li{list-style:none;margin-bottom:1px}
.supp-detail li::before{content:"✓ ";color:#9a9188;font-size:10px}
.an{background:#f5f3ee;border-radius:8px;padding:10px 14px;font-size:12px;color:#9a9188;line-height:1.6;margin-top:1rem;border-left:2px solid rgba(26,24,20,.15)}
.an strong{color:#4a4540}
@media(max-width:600px){.mg{grid-template-columns:1fr 1fr}.sg{grid-template-columns:1fr}.tg{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="logo">Fit Map</div>
  <button class="back" onclick="history.back()">‹ 목록으로</button>
</header>

<div class="wrap" id="wrap">
  <div style="text-align:center;padding:4rem;color:#9a9188">데이터를 불러오는 중...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const d=JSON.parse(sessionStorage.getItem('fm_result')||'null');
if(!d){document.getElementById('wrap').innerHTML='<div style="text-align:center;padding:4rem;color:#A32D2D">데이터가 없습니다. <a href="/">목록으로 돌아가기</a></div>';}
else render(d);

function fmt(n){if(n==null||n===undefined)return '-';const m=Math.abs(n)/10000;const s=n<0?'-':'';if(m>=10000)return s+(m/10000).toFixed(1)+'조';if(m>=1000)return s+(m/1000).toFixed(1)+'억';return s+Math.round(m)+'만';}
function grEl(g){const c=g==='A'?'gA':g==='B'?'gB':'gC';return`<span class="gr ${c}">${g||'-'}</span>`;}
function trendEl(periods,key){
  if(periods.length<2)return'<span style="color:#9a9188">-</span>';
  const cur=periods[periods.length-1][key];const prev=periods[periods.length-2][key];
  const grades=['C','B','A'];const ci=grades.indexOf(cur),pi=grades.indexOf(prev);
  if(ci>pi)return'<span style="color:#3B6D11">↗ 개선</span>';
  if(ci<pi)return'<span style="color:#A32D2D">↘ 악화</span>';
  return'<span style="color:#9a9188">→ 유지</span>';
}

function render(d){
  const f=d.financials||{};
  const m=d.mpes||{};
  const hist=m.history||[];
  const cur=m.current||{};
  const mentors=d.recommended_mentors||{};
  const topFields=d.growth_partner_fields||[];
  const biz=d.biz_context||{};
  const progs=d.matched_programs||[];
  const actions=d.action_items||[];
  const triggers=d.triggers||[];

  document.getElementById('wrap').innerHTML=`
  <div class="co-hdr">
    <div>
      <div class="co-sub">Fit Map 종합 진단 리포트 · ${d.report_date||''}</div>
      <div class="co-nm">${d.company||'(기업명)'}</div>
    </div>
    <div class="co-dt">분석일: ${new Date().toLocaleDateString('ko-KR')}</div>
  </div>

  <div class="tab-row">
    <button class="tab active" onclick="showTab('fin',this)">재무 경향성</button>
    <button class="tab" onclick="showTab('mpes',this)">MPES 진단</button>
    <button class="tab" onclick="showTab('prog',this)">밸류업 프로그램</button>
    <button class="tab" onclick="showTab('biz',this)">사업개발 연계</button>
  </div>

  <!-- TAB 1 -->
  <div id="tab-fin" class="tp active">
    <div class="sl">핵심 지표</div>
    <div class="mg">
      <div class="mc"><div class="ml">현금잔고</div><div class="mv">${fmt(f.cash)}</div></div>
      <div class="mc"><div class="ml">월 평균 순유출</div><div class="mv">${fmt(f.monthly_net_burn)}</div><div class="ms">실제 기준</div></div>
      <div class="mc"><div class="ml">런웨이</div><div class="mv" id="rwVal">-</div><div class="ms">순유출 기준</div></div>
      <div class="mc"><div class="ml">보조금 의존도</div><div class="mv">${f.gov_subsidy_ratio!=null?Math.round(f.gov_subsidy_ratio)+'%':'-'}</div></div>
    </div>
    <div class="cw">
      <div class="ct">현금잔고 추이 및 런웨이 예측</div>
      <div class="cs">실선: 실적 / 점선: 향후 3분기 예측 · 경고선(6개월) / 주의선(12개월) — 순유출 기준</div>
      <div class="leg">
        <div class="li"><div class="ld" style="background:#185FA5"></div>실적</div>
        <div class="li"><div class="ld" style="background:#3B6D11;opacity:.7"></div>계획 달성 시</div>
        <div class="li"><div class="ld" style="background:#BA7517;opacity:.7"></div>현재 추세 시</div>
        <div class="li"><div class="ld" style="background:#A32D2D"></div>경고선(6개월)</div>
        <div class="li"><div class="ld" style="background:#E24B4A;opacity:.6"></div>주의선(12개월)</div>
      </div>
      <div style="position:relative;width:100%;height:220px"><canvas id="cashChart" role="img" aria-label="현금잔고 추이 및 예측 그래프">현금잔고 추이 차트</canvas></div>
    </div>
    <div class="note" id="cashNote"></div>
    <div class="cw" style="margin-top:1rem">
      <div class="ct">연도별 매출 vs 비용</div>
      <div class="cs">단위: 억원</div>
      <div class="leg">
        <div class="li"><div class="ld" style="background:#1D9E75"></div>매출</div>
        <div class="li"><div class="ld" style="background:#D85A30"></div>비용(판관비)</div>
      </div>
      <div style="position:relative;width:100%;height:200px"><canvas id="revChart" role="img" aria-label="연도별 매출 및 비용 추이">매출/비용 추이 차트</canvas></div>
    </div>
    <div class="sl" style="margin-top:1.5rem">트리거 감지</div>
    <div class="tg" id="triggerGrid"></div>
  </div>

  <!-- TAB 2 -->
  <div id="tab-mpes" class="tp">
    <div class="sl">MPES 경향성 분석</div>
    <table class="mt" id="mpesTable"></table>
    <div class="dv"></div>
    <div class="sl">종합 코멘트</div>
    <div class="summ">${m.summary||''}</div>
  </div>

  <!-- TAB 3 -->
  <div id="tab-prog" class="tp">
    <div class="gp-hdr">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span class="gp-badge">필수</span>
        <span class="gp-ttl">그로스파트너스 멘토 매칭</span>
      </div>
      <div class="gp-sub">성과 및 계획 기반 ${topFields.length}개 부문 · 각 부문 TOP 5</div>
    </div>
    <div class="gp-tabs" id="gpTabs"></div>
    <div id="gpPanels"></div>
    <div class="dv"></div>
    <div class="sl">밸류업 프로그램 우선순위</div>
    <div class="pl" id="progList"></div>
    <div class="dv"></div>
    <div class="sl">즉시 실행 액션</div>
    <div class="ac-box" id="acBox"></div>
  </div>

  <!-- TAB 4 -->
  <div id="tab-biz" class="tp">
    <div class="sl">사업개발 현황</div>
    <div class="sc">
      <div style="font-size:15px;font-weight:600;margin-bottom:12px">${d.company||''} — 사업 현황 요약</div>
      <div class="sr2" id="bizStatus"></div>
      <div class="sg" id="bizGrid"></div>
    </div>
    <div class="dv"></div>
    ${buildBizPrograms()}
  </div>
  `;

  buildCharts(f,m);
  buildTriggers(triggers,f);
  buildMpesTable(hist,cur,m);
  buildMentors(topFields,mentors);
  buildPrograms(progs);
  buildActions(actions);
  buildBizContext(biz);
}

function buildCharts(f,m){
  const cash=f.cash||0;
  const burn=Math.abs(f.monthly_net_burn||0);
  const rw=burn>0?Math.round(cash/burn):null;
  if(rw!=null)document.getElementById('rwVal').textContent=rw+'개월';

  const warn6=burn*6;const caution12=burn*12;

  // 캐시 히스토리
  const ch=f.cash_history||[];
  const labels=ch.map(x=>x.period);
  const actuals=ch.map(x=>(x.cash||0)/100000000);

  // 예측 (3분기)
  const lastCash=actuals[actuals.length-1]||0;
  const burnB=(burn||0)/100000000;
  const plan=f.plan||{};
  const predLabels=['예측Q2','예측Q3','예측Q4'];
  const planPred=[
    lastCash-((plan.q2_cost||0)-(plan.q2_revenue||0))/100000000,
    lastCash-((plan.q2_cost||0)-(plan.q2_revenue||0)+(plan.q3_cost||0)-(plan.q3_revenue||0))/100000000,
    lastCash-((plan.q2_cost||0)-(plan.q2_revenue||0)+(plan.q3_cost||0)-(plan.q3_revenue||0)+(plan.q4_cost||0)-(plan.q4_revenue||0))/100000000,
  ];
  const trendPred=[lastCash-burnB*3, lastCash-burnB*6, lastCash-burnB*9];
  const allLabels=[...labels,...predLabels];
  const nullPad=Array(actuals.length).fill(null);

  const isDark=matchMedia('(prefers-color-scheme: dark)').matches;
  const tc=isDark?'rgba(255,255,255,.45)':'rgba(0,0,0,.4)';
  const gc=isDark?'rgba(255,255,255,.07)':'rgba(0,0,0,.05)';

  new Chart(document.getElementById('cashChart'),{
    type:'line',
    data:{labels:allLabels,datasets:[
      {label:'실적',data:[...actuals,...Array(3).fill(null)],borderColor:'#185FA5',backgroundColor:'rgba(24,95,165,.07)',borderWidth:2.5,pointRadius:4,fill:true,tension:0.3},
      {label:'계획',data:[...nullPad.slice(0,-1),lastCash,...planPred],borderColor:'#3B6D11',borderWidth:2,pointRadius:3,borderDash:[6,3],fill:false,tension:0.3},
      {label:'추세',data:[...nullPad.slice(0,-1),lastCash,...trendPred],borderColor:'#BA7517',borderWidth:2,pointRadius:3,borderDash:[3,3],fill:false,tension:0.3},
      {label:'경고선',data:Array(allLabels.length).fill(warn6/100000000),borderColor:'#A32D2D',borderWidth:1.5,borderDash:[6,4],pointRadius:0,fill:false},
      {label:'주의선',data:Array(allLabels.length).fill(caution12/100000000),borderColor:'#E24B4A',borderWidth:1.2,borderDash:[4,4],pointRadius:0,fill:false},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.raw==null?null:ctx.dataset.label+': '+Math.round(ctx.raw*10)/10+'억원'}}},
      scales:{x:{ticks:{color:tc,font:{size:10},maxRotation:30},grid:{color:gc}},y:{ticks:{color:tc,font:{size:10},callback:v=>v+'억'},grid:{color:gc},min:0}}
    }
  });

  // 코멘트
  const note=document.getElementById('cashNote');
  if(burn>0){
    const rw2=Math.round(cash/burn);
    const warnStatus=cash<warn6?`<strong style="color:#A32D2D">⚠ 현재 현금이 경고선(${Math.round(warn6/100000000*10)/10}억) 이하입니다</strong>`:cash<caution12?`<strong style="color:#854F0B">주의: 현재 현금이 주의선(${Math.round(caution12/100000000*10)/10}억) 이하입니다</strong>`:`<strong style="color:#3B6D11">✅ 현재 현금 여유 (임계선 상회)</strong>`;
    note.innerHTML=`<strong>📌 임계선 기준 안내</strong><br>순유출(국고보조금 포함) 기준 월 ${fmt(burn)}원. 경고선 ${fmt(warn6)} / 주의선 ${fmt(caution12)}. ${warnStatus}<br><span style="color:#9a9188">런웨이 약 ${rw2}개월 (현재 추세 기준)</span>`;
  }

  // 매출/비용 차트
  const rh=f.revenue_history||[];
  if(rh.length){
    new Chart(document.getElementById('revChart'),{
      type:'bar',
      data:{labels:rh.map(x=>x.period),datasets:[
        {label:'매출',data:rh.map(x=>(x.revenue||0)/100000000),backgroundColor:'rgba(29,158,117,.75)',borderRadius:3},
        {label:'비용',data:rh.map(x=>(x.cost||0)/100000000),backgroundColor:'rgba(216,90,48,.65)',borderRadius:3},
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+Math.round(ctx.raw*10)/10+'억원'}}},
        scales:{x:{ticks:{color:tc,font:{size:10}},grid:{color:gc}},y:{ticks:{color:tc,font:{size:10},callback:v=>v+'억'},grid:{color:gc},min:0}}
      }
    });
  }
}

function buildTriggers(triggers,f){
  const el=document.getElementById('triggerGrid');
  const typeMap={warn:'tw',caution:'ti',ok:'tok'};
  if(!triggers.length){
    el.innerHTML='<div class="tc tok"><div class="tt">특이 트리거 없음</div><div class="td2">현재 주요 이슈 없음</div></div>';
    return;
  }
  el.innerHTML=triggers.map(t=>{
    const cls=typeMap[t.type]||'ti';
    return`<div class="tc ${cls}"><div class="tt">${t.title}</div><div class="td2">${t.desc}</div></div>`;
  }).join('');
}

function buildMpesTable(hist,cur,m){
  const el=document.getElementById('mpesTable');
  const periods=hist.map(h=>h.period);
  const labels={L:'유동성',G:'성장성',S:'안정성',P:'수익성'};
  const keys=['L','G','S','P'];
  const detailKeys={L:'liquidity',G:'growth',S:'stability',P:'profitability'};

  let th=`<thead><tr><th>지표</th>${periods.map(p=>`<th>${p}</th>`).join('')}<th>경향</th><th>현재 수치 / 근거</th></tr></thead>`;
  let tb='<tbody>';
  for(const k of keys){
    const det=cur[detailKeys[k]]||{};
    tb+=`<tr><td><strong style="font-weight:500">${labels[k]}</strong></td>`;
    for(const h of hist) tb+=`<td>${grEl(h[k])}</td>`;
    tb+=`<td>${trendEl(hist,k)}</td><td style="font-size:12px;color:#9a9188">${det.value||''}<br>${det.reason||''}</td></tr>`;
  }
  // 종합
  tb+=`<tr style="background:#f5f3ee"><td><strong style="font-weight:500">종합</strong></td>`;
  for(const h of hist){
    const ov=(h.L||'-')+(h.G||'-')+(h.S||'-')+(h.P||'-');
    tb+=`<td><div class="ob">${ov.split('').map(g=>`<span class="${g==='A'?'up':g==='C'?'dn':''}">${g}</span>`).join('')}</div></td>`;
  }
  tb+=`<td></td><td style="font-size:12px"><span style="background:#FAEEDA;color:#854F0B;padding:3px 9px;border-radius:6px;font-weight:600">${m.group||''}</span></td></tr>`;
  tb+='</tbody>';
  el.innerHTML=th+tb;
}

function buildMentors(topFields,mentors){
  const tabs=document.getElementById('gpTabs');
  const panels=document.getElementById('gpPanels');
  if(!topFields.length){panels.innerHTML='<div style="color:#9a9188;font-size:13px;padding:1rem">추천 분야 없음</div>';return;}
  tabs.innerHTML=topFields.map((f,i)=>`<button class="gpt${i===0?' active':''}" onclick="showGpTab('gp${i}',this)">${f}</button>`).join('');
  panels.innerHTML=topFields.map((field,fi)=>{
    const list=mentors[field]||[];
    const cards=list.map((m,i)=>{
      const ctags=(m.countries||[]).map(c=>`<span class="ctag">${c}</span>`).join('');
      return`<div class="mcard"><div class="mrk">${i+1}</div><div class="mbody">
        <div class="mnm">${m.name} <span class="mttl">${m.title}</span></div>
        <div class="morg">${m.org}</div>
        <div class="mtags">${(m.fields||[]).slice(0,3).map(f=>`<span class="mtag">${f}</span>`).join('')}</div>
        ${ctags?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:3px">${ctags}</div>`:''}
        ${m.expertise?`<div class="mexp">💼 ${m.expertise}</div>`:''}
        ${m.match_reason?`<div class="mmatch">🎯 ${m.match_reason}</div>`:''}
      </div><div class="myrs">${m.years}년</div></div>`;
    }).join('');
    return`<div id="gp${fi}" class="gpp${fi===0?' active':''}"><div class="gp-reason">분야: <strong>${field}</strong></div><div class="mlist">${cards}</div></div>`;
  }).join('');
}

function showTab(id,btn){
  document.querySelectorAll('.tp').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}
function showGpTab(id,btn){

  document.getElementById(id).classList.add('active');

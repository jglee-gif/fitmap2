<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fit Map — 포트폴리오 진단</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:#f5f3ee;color:#1a1814;min-height:100vh}
header{position:sticky;top:0;z-index:100;background:#f5f3ee;border-bottom:1px solid rgba(26,24,20,.1);padding:0 2rem;height:58px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700}
.logo-sub{font-size:12px;color:#9a9188;margin-left:8px}
.status{display:flex;align-items:center;gap:7px;font-size:12px;color:#9a9188}
.dot{width:7px;height:7px;border-radius:50%;background:#97C459;flex-shrink:0}
.dot.err{background:#E24B4A}
main{max-width:660px;margin:0 auto;padding:3.5rem 1.5rem 6rem}
h1{font-family:'Noto Serif KR',serif;font-size:30px;font-weight:700;line-height:1.3;margin-bottom:10px}
.sub{font-size:15px;color:#4a4540;line-height:1.8;margin-bottom:2.5rem}
.drop{border:1.5px dashed #d0ccc4;border-radius:16px;padding:3rem 2rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:#fff;position:relative}
.drop:hover,.drop.drag{border-color:#2d5a3d;background:#e8f0ea}
.di{width:52px;height:52px;background:#f5f3ee;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:24px}
.dt{font-size:15px;font-weight:600;margin-bottom:5px}
.dd{font-size:13px;color:#9a9188;margin-bottom:18px;line-height:1.6}
.btn{display:inline-block;padding:9px 22px;background:#1a1814;color:#fff;border-radius:999px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:'Pretendard',sans-serif;transition:opacity .15s}
.btn:hover{opacity:.8}
#fi{display:none}
.flist{display:flex;flex-direction:column;gap:6px;margin-top:14px;text-align:left}
.fi-item{display:flex;align-items:center;gap:8px;padding:7px 12px;background:#f5f3ee;border-radius:8px;font-size:13px;color:#1a1814}
.fi-icon{font-size:15px}
.fi-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fi-rm{background:none;border:none;cursor:pointer;color:#9a9188;font-size:16px;line-height:1;padding:0 2px}
.fi-rm:hover{color:#A32D2D}
.analyze-btn{width:100%;margin-top:18px;padding:12px;font-size:14px}
.hist-header{display:flex;align-items:center;justify-content:space-between;margin:2.5rem 0 1rem}
.ht{font-size:12px;font-weight:600;color:#9a9188;letter-spacing:.05em;text-transform:uppercase}
.hcount{font-size:12px;color:#9a9188}
.co-list{display:flex;flex-direction:column;gap:8px}
.co-card{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#fff;border:1px solid rgba(26,24,20,.08);border-radius:10px;cursor:pointer;transition:box-shadow .15s,border-color .15s;text-decoration:none;color:inherit}
.co-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.07);border-color:rgba(26,24,20,.15)}
.co-ic{width:38px;height:38px;border-radius:9px;background:#f5f3ee;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.co-inf{flex:1;min-width:0}
.co-nm{font-size:14px;font-weight:600;margin-bottom:2px}
.co-mt{font-size:12px;color:#9a9188}
.co-gr{display:flex;gap:1px;flex-shrink:0;font-size:16px;font-weight:600;letter-spacing:1px}
.gA{color:#3B6D11}.gB{color:#854F0B}.gC{color:#A32D2D}
.co-arr{color:#9a9188;font-size:15px;flex-shrink:0}
.empty{text-align:center;padding:2.5rem 1rem;color:#9a9188;font-size:14px;line-height:1.8}
.loading{display:none;position:fixed;inset:0;background:rgba(245,243,238,.9);backdrop-filter:blur(8px);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.loading.on{display:flex}
.spin{width:38px;height:38px;border-radius:50%;border:2px solid #d0ccc4;border-top-color:#2d5a3d;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lt{font-family:'Noto Serif KR',serif;font-size:19px}
.ls{font-size:13px;color:#9a9188}
.toast{display:none;position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#A32D2D;color:#fff;padding:11px 20px;border-radius:999px;font-size:13px;z-index:300;white-space:nowrap}
.toast.on{display:block;animation:fu .3s ease}
@keyframes fu{from{opacity:0;transform:translateX(-50%) translateY(8px)}}
</style>
</head>
<body>
<header>
  <div><span class="logo">Fit Map</span><span class="logo-sub">포트폴리오 진단 시스템</span></div>
  <div class="status"><div class="dot" id="dot"></div><span id="stxt">서버 확인 중</span></div>
</header>

<main>
  <h1>결산 자료를 올리면<br>자동으로 진단합니다</h1>
  <p class="sub">재무상태표 · 손익계산서 · 성과 및 계획(Excel)을 업로드하면<br>MPES 등급 · 런웨이 분석 · 멘토 매칭 · 사업개발 연계를 자동 분석합니다.</p>

  <div class="drop" id="drop">
    <div class="di">📊</div>
    <div class="dt">파일을 드래그하거나 클릭해서 업로드</div>
    <div class="dd">재무상태표 · 손익계산서 (PDF) + 성과 및 계획 (Excel)<br>여러 파일 동시 선택 가능</div>
    <button class="btn" onclick="document.getElementById('fi').click()">파일 선택</button>
    <input type="file" id="fi" accept=".pdf,.xlsx,.xls" multiple>
    <div class="flist" id="flist"></div>
    <button class="btn analyze-btn" id="abtn" style="display:none" onclick="analyze()">진단 시작 →</button>
  </div>

  <div class="hist-header">
    <span class="ht">진단 이력</span>
    <span class="hcount" id="hcount">0건</span>
  </div>
  <div class="co-list" id="coList">
    <div class="empty">아직 진단한 기업이 없어요.<br>위에서 파일을 업로드해 첫 진단을 시작하세요.</div>
  </div>
</main>

<div class="loading" id="loading">
  <div class="spin"></div>
  <div class="lt">분석 중...</div>
  <div class="ls" id="lstep">파일을 읽고 있습니다</div>
</div>
<div class="toast" id="toast"></div>

<script>
const STEPS=['파일을 읽고 있습니다','AI가 재무 데이터를 분석합니다','MPES 등급을 계산합니다','밸류업 프로그램을 매칭합니다','그로스파트너스 멘토를 연결합니다'];
let files=[],stepT,hist=JSON.parse(localStorage.getItem('fm_hist')||'[]');

async function ping(){
  try{const r=await fetch('/api/health');const d=await r.json();
    document.getElementById('dot').classList.remove('err');
    document.getElementById('stxt').textContent=`정상 · 멘토 ${d.mentors}명`;
  }catch{document.getElementById('dot').classList.add('err');document.getElementById('stxt').textContent='서버 연결 안됨';}
}
ping();setInterval(ping,30000);

const drop=document.getElementById('drop');
drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('drag')});
drop.addEventListener('dragleave',()=>drop.classList.remove('drag'));
drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('drag');addFiles(e.dataTransfer.files)});
document.getElementById('fi').addEventListener('change',e=>addFiles(e.target.files));

function addFiles(fl){
  for(const f of fl){
    if(!f.name.match(/\.(pdf|xlsx|xls)$/i)){showToast('PDF 또는 Excel 파일만 가능합니다.');continue;}
    if(!files.find(x=>x.name===f.name))files.push(f);
  }
  renderFiles();
}
function removeFile(i){files.splice(i,1);renderFiles();}
function renderFiles(){
  const fl=document.getElementById('flist');
  fl.innerHTML=files.map((f,i)=>`<div class="fi-item"><span class="fi-icon">${f.name.endsWith('.pdf')?'📄':'📊'}</span><span class="fi-name">${f.name}</span><button class="fi-rm" onclick="removeFile(${i})">✕</button></div>`).join('');
  document.getElementById('abtn').style.display=files.length?'block':'none';
}

async function analyze(){
  if(!files.length)return;
  const ld=document.getElementById('loading');ld.classList.add('on');
  let si=0;stepT=setInterval(()=>{si=(si+1)%STEPS.length;document.getElementById('lstep').textContent=STEPS[si];},2800);
  try{
    const fd=new FormData();
    files.forEach(f=>fd.append('file',f));
    const res=await fetch('/api/analyze',{method:'POST',body:fd});
    if(!res.ok){const e=await res.json();throw new Error(e.error||'서버 오류');}
    const data=await res.json();
    const entry={...data,_files:files.map(f=>f.name),_at:new Date().toISOString()};
    hist.unshift(entry);if(hist.length>50)hist=hist.slice(0,50);
    localStorage.setItem('fm_hist',JSON.stringify(hist));
    sessionStorage.setItem('fm_result',JSON.stringify(data));
    window.location.href='/report';
  }catch(e){showToast('분석 실패: '+e.message);}
  finally{clearInterval(stepT);ld.classList.remove('on');document.getElementById('fi').value='';}
}

function grSpan(g){return`<span class="g${g||'-'}">${g||'-'}</span>`}
function renderHist(){
  const el=document.getElementById('coList');
  document.getElementById('hcount').textContent=hist.length+'건';
  if(!hist.length){el.innerHTML='<div class="empty">아직 진단한 기업이 없어요.<br>위에서 파일을 업로드해 첫 진단을 시작하세요.</div>';return;}
  el.innerHTML=hist.map((d,i)=>{
    const ov=d.mpes?.overall||'----';
    const gr=ov.split('').map(grSpan).join('');
    const dt=d._at?new Date(d._at).toLocaleString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
    return`<div class="co-card" onclick="openReport(${i})"><div class="co-ic">🏢</div><div class="co-inf"><div class="co-nm">${d.company||'(기업명 미확인)'}</div><div class="co-mt">${dt} · ${(d._files||[]).join(', ')}</div></div><div class="co-gr">${gr}</div><div class="co-arr">›</div></div>`;
  }).join('');
}
function openReport(i){sessionStorage.setItem('fm_result',JSON.stringify(hist[i]));window.location.href='/report';}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),4000);}
renderHist();
</script>
</body>
</html>
